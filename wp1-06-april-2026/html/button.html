<!-- PEMBUKA HTML -->
<html>
  <!-- METADATA -->
  <head>
    <!-- JUDUL WEBSITE -->
    <title>HTML Button Dasar</title>
  </head>

  <!-- ISI WEBSITE -->
  <body>
    <h1>HTML Button Dasar</h1>

    <!-- FORM RADIO BUTTON -->
    <form>
      <input type="radio" name="gender" value="male" /> Male

      <!-- TAG ENTER (BR) -->
      <br />
      <input type="radio" name="gender" value="female" /> Female

      <br />
      <input type="radio" name="gender" value="other" /> Other

      <br />

      <!-- TOMBOL SUBMIT -->
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
