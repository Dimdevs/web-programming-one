<!-- PEMBUKA HTML -->
<html>
  <!-- METADATA -->
  <head>
    <!-- JUDUL WEBSITE -->
    <title>HTML Select Dasar</title>
  </head>

  <!-- ISI WEBSITE -->
  <body>
    <h1>HTML Select Dasar</h1>

    <!-- FORM SELECT -->
    <form>
      <label for="vehicle">Choose a vehicle:</label>
      <select name="vehicle" id="vehicle">
        <option value="Bike">I have a bike</option>
        <option value="Car">I have a car</option>
        <option value="Boat">I have a boat</option>
      </select>
      <br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
