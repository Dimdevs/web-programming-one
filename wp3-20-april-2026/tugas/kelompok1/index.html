<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Daftar Produk Kamera</title>

    <style>
      body {
        font-family: Arial;
        background-color: #eee;
      }

      .container {
        width: 700px;
        margin: 50px auto;
        border: 2px solid #999;
        padding: 10px;
        background-color: #ddd;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background-color: #e6b17e;
        padding: 10px;
        font-size: 20px;
        border: 1px solid black;
      }

      td {
        border: 1px solid black;
        padding: 10px;
      }

      .kiri {
        background-color: #e5e88c;
        width: 150px;
        text-align: center;
      }

      .label {
        background-color: #00e65c;
        width: 150px;
        font-weight: bold;
      }

      .isi {
        background: linear-gradient(to right, violet, deeppink);
        color: black;
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <table>
        <tr>
          <th colspan="3">DAFTAR PRODUK</th>
        </tr>

        <tr>
          <td rowspan="3" class="kiri">
            <img
              src="https://media-ik.croma.com/prod/https://media.tatacroma.com/Croma%20Assets/Imaging/Camera%20and%20Camcorders/Images/267969_0_sfdpf0.png?tr=w-1000"
              width="120"
            />
          </td>
          <td class="label">Nama Produk</td>
          <td class="isi">Canon EOS M10 Kit EF-M 15-45mm</td>
        </tr>

        <tr>
          <td class="label">Harga</td>
          <td class="isi">Rp 4,899,000</td>
        </tr>

        <tr>
          <td class="label">Fitur Produk</td>
          <td class="isi">
            <ul>
              <li>Kamera mirrorless</li>
              <li>Efektivitas Piksel: 18 MP</li>
              <li>Tipe sensor: CMOS DIGIC 6</li>
              <li>Layar: 3.0 Inch</li>
              <li>Memiliki lampu flash hingga 5 meter</li>
            </ul>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
